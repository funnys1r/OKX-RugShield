version: '3.8'

services:
  claw-rugshield:
    image: node:20-alpine
    container_name: okx-rugshield-agent
    volumes:
       - ./:/app
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "npm install && node cli/rugshield.js --auto-pilot"
    restart: unless-stopped
    networks:
      - onchain-network

networks:
  onchain-network:
    driver: bridge
